name: Release

on:
  push:
    branches:
      - '*release*'
      - '*release*/**'
      - '**/release*'
      - '**/*release*'

permissions:
  contents: write

jobs:
  build-and-upload:
    if: contains(github.ref_name, 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package
        run: pnpm package

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: cp build/chrome-mv3-prod.zip "build/ehentai-helper-${{ steps.version.outputs.version }}.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: E-Hentai Helper v${{ steps.version.outputs.version }}
          files: build/ehentai-helper-*.zip
          generate_release_notes: false
          body: |
            ## 安装方法（Chrome）

            1. 到下方的 **Assets**，点击下载 `ehentai-helper-${{ steps.version.outputs.version }}.zip`
            2. 解压这个 zip（会得到一个文件夹）
            3. 在 Chrome 浏览器的地址栏输入下面这行并回车：

               `chrome://extensions`

            4. 打开右上角的 **「开发者模式」**
            5. 点击 **「加载已解压的扩展程序」**，选择刚才解压出来的那个文件夹
            6. 装好后，扩展列表里会出现 **E-Hentai Helper**

            > 升级方法：重复以上步骤，选新解压的文件夹覆盖即可。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete release branch
        if: startsWith(github.ref_name, 'release/')
        run: |
          git push origin --delete "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
